name: Merge Guard

# Ensures dist/EXpress.ps1 is in sync with modules/*.ps1.
# Runs Merge-Source.ps1 and fails if the committed dist/ output differs
# from what the current modules/ tree would produce.

on:
  push:
    branches: [master, main]
    paths:
      - 'modules/**'
      - 'EXpress.ps1'
      - 'tools/Merge-Source.ps1'
      - 'dist/**'
  pull_request:
    paths:
      - 'modules/**'
      - 'EXpress.ps1'
      - 'tools/Merge-Source.ps1'
      - 'dist/**'

jobs:
  merge-guard:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Merge-Source.ps1
        shell: pwsh
        run: |
          ./tools/Merge-Source.ps1 -Quiet

      - name: AST parse gate
        shell: pwsh
        run: |
          ./tools/Parse-Check.ps1 -Path './dist/EXpress.ps1'

      - name: Verify dist/EXpress.ps1 matches src/
        shell: pwsh
        run: |
          git diff --exit-code -- dist/EXpress.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Host '::error::dist/EXpress.ps1 is out of sync with modules/*.ps1. Run tools/Merge-Source.ps1 locally and commit the result.'
            exit 1
          }

      - name: Run Pester tests
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [Version]'5.0' })) {
            Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          }
          Import-Module Pester -MinimumVersion 5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './EXpress.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg
