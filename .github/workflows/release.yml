name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [Version]'5.0' })) {
            Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          }
          Import-Module Pester -MinimumVersion 5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './EXpress.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputFormat = 'JUnitXml'
          $cfg.TestResult.OutputPath = 'pester-results.xml'
          Invoke-Pester -Configuration $cfg

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: pester-results.xml

  build-release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="EXpress-v${VERSION}"
          mkdir -p "$STAGING/tools" "$STAGING/templates" "$STAGING/assets" "$STAGING/sources"

          # Main script — dist/ merged file, placed as EXpress.ps1 in ZIP root
          cp dist/EXpress.ps1 "$STAGING/EXpress.ps1"

          # Optional extras end users may want
          cp deploy-example.psd1  "$STAGING/"
          cp Start-EXpress.cmd    "$STAGING/"
          cp templates/*.docx     "$STAGING/templates/"
          cp assets/logo.png      "$STAGING/assets/"
          cp tools/Get-EXpressDownloads.ps1      "$STAGING/tools/"
          cp tools/Enable-EXpressRemoteQuery.ps1 "$STAGING/tools/"

          # Empty pre-staging folder with README explaining what to place here
          cp sources/README.md "$STAGING/sources/"

          zip -r "${STAGING}.zip" "$STAGING/"
          echo "ZIP=${STAGING}.zip" >> "$GITHUB_ENV"
          echo "STAGING=${STAGING}"  >> "$GITHUB_ENV"

      - name: Extract release notes for this version
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the block for this version from RELEASE-NOTES.md
          # Block starts at "## vVERSION" and ends before the next "## v" or EOF
          awk "/^## v${VERSION}[[:space:]]/,/^## v[0-9]/" RELEASE-NOTES.md \
            | head -n -1 \
            | sed '/^---$/d' \
            > release_body.md
          # Fallback if nothing extracted
          if [ ! -s release_body.md ]; then
            echo "Release v${VERSION}" > release_body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EXpress v${{ steps.version.outputs.version }}"
          body_path: release_body.md
          files: ${{ env.ZIP }}
